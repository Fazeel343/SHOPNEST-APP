
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>ShopNest — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center">
  <div class="card" style="width:400px;padding:40px">
    <h2 style="font-size:24px;font-weight:800;margin-bottom:24px">
      Welcome to <span style="color:#f97316">ShopNest</span>
    </h2>
    <div id="msg"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px"
            onclick="doLogin()">Login</button>
    <p style="text-align:center;margin-top:16px;font-size:13px;color:#64748b">
      No account? <a href="register.html" style="color:#f97316">Register</a>
    </p>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  async function doLogin() {
    const email    = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const msg      = document.getElementById('msg');
    try {
      const data = await api.post('/auth/login', { email, password });
      localStorage.setItem('shopnest_token', data.token);
      localStorage.setItem('shopnest_user', JSON.stringify(data.user));
      location.href = data.user.role === 'admin' ? '/admin.html' : '/';
    } catch(e) {
      msg.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
    }
  }
</script>
</body>
</html>

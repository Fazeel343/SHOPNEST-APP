
<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8"><title>ShopNest — Cart</title>
<link rel="stylesheet" href="css/style.css"></head>
<body>
<nav class="navbar">
  <a href="/" class="logo">ShopNest</a>
  <ul class="nav-links">
    <li><a href="/">Shop</a></li>
    <li><a href="orders.html">Orders</a></li>
  </ul>
  <button class="btn btn-outline" onclick="logout()">Logout</button>
</nav>
<div class="container" style="padding-top:32px">
  <h1 style="font-size:24px;font-weight:800;margin-bottom:24px">Your Cart</h1>
  <div id="cart-items"></div>
  <div id="cart-total" style="text-align:right;margin-top:16px"></div>
  <div style="text-align:right;margin-top:16px">
    <a href="checkout.html" class="btn btn-primary">Proceed to Checkout →</a>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script>
  async function loadCart() {
    if (!getToken()) return location.href='/login.html';
    const items = await api.get('/cart');
    const total = items.reduce((s, i) => s + i.SUBTOTAL, 0);
    document.getElementById('cart-items').innerHTML = items.length
      ? items.map(i => `
          <div class="card" style="display:flex;align-items:center;
               gap:16px;padding:16px;margin-bottom:12px">
            <div style="flex:1">
              <div style="font-weight:700">${i.NAME}</div>
              <div style="color:#64748b;font-size:13px">
                Qty: ${i.QUANTITY} × Rs. ${Number(i.PRICE).toLocaleString()}
              </div>
            </div>
            <div style="font-weight:800;color:#f97316">
              Rs. ${Number(i.SUBTOTAL).toLocaleString()}
            </div>
            <button class="btn btn-danger" style="padding:6px 12px"
                    onclick="removeItem(${i.CART_ITEM_ID})">✕</button>
          </div>`)
        .join('')
      : '<p style="color:#64748b">Your cart is empty. <a href="/">Shop now</a></p>';
    document.getElementById('cart-total').innerHTML =
      `<strong style="font-size:20px">Total: Rs. ${Number(total).toLocaleString()}</strong>`;
  }

  async function removeItem(id) {
    await api.delete('/cart/' + id);
    loadCart();
  }

  loadCart();
</script>
</body></html>

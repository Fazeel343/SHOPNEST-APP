
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>ShopNest — Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center">
  <div class="card" style="width:420px;padding:40px">
    <h2 style="font-size:24px;font-weight:800;margin-bottom:24px">Create Account</h2>
    <div id="msg"></div>
    <div class="form-group"><label>Full Name</label>
      <input type="text" id="name" placeholder="Ali Khan"></div>
    <div class="form-group"><label>Email</label>
      <input type="email" id="email" placeholder="ali@example.com"></div>
    <div class="form-group"><label>Phone</label>
      <input type="text" id="phone" placeholder="03XX-XXXXXXX"></div>
    <div class="form-group"><label>Password</label>
      <input type="password" id="password"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px"
            onclick="doRegister()">Register</button>
    <p style="text-align:center;margin-top:16px;font-size:13px;color:#64748b">
      Already have an account? <a href="login.html" style="color:#f97316">Login</a>
    </p>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  async function doRegister() {
    const msg = document.getElementById('msg');
    try {
      await api.post('/auth/register', {
        full_name: document.getElementById('name').value,
        email:     document.getElementById('email').value,
        phone:     document.getElementById('phone').value,
        password:  document.getElementById('password').value
      });
      msg.innerHTML = `<div class="alert alert-success">Registered! Redirecting...</div>`;
      setTimeout(() => location.href = '/login.html', 1000);
    } catch(e) {
      msg.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
    }
  }
</script>
</body>
</html>

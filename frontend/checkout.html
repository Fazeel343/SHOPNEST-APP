<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShopNest — Checkout</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="/" class="logo">ShopNest</a>
  <ul class="nav-links">
    <li><a href="/">Shop</a></li>
    <li><a href="cart.html">← Back to Cart</a></li>
  </ul>
</nav>

<div class="container" style="padding-top:32px;max-width:600px">
  <h1 style="font-size:24px;font-weight:800;margin-bottom:24px">Checkout</h1>
  <div id="msg"></div>

  <!-- Order Summary -->
  <div class="card" style="padding:20px;margin-bottom:20px">
    <h3 style="font-weight:700;margin-bottom:12px">Order Summary</h3>
    <div id="order-summary" style="color:#64748b;font-size:14px">
      Loading...
    </div>
    <div id="order-total"
         style="font-size:20px;font-weight:800;color:#f97316;
                margin-top:12px;text-align:right"></div>
  </div>

  <!-- Checkout Form -->
  <div class="card" style="padding:28px">

    <!-- Address -->
    <div class="form-group">
      <label>Delivery Address</label>
      <select id="address-select">
        <option value="">Loading addresses...</option>
      </select>
    </div>

    <!-- New Address Option -->
    <div id="new-address-box" style="display:none">
      <div class="form-group">
        <label>Street</label>
        <input type="text" id="new-street" placeholder="House #, Street, Area">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>City</label>
          <input type="text" id="new-city" placeholder="Karachi">
        </div>
        <div class="form-group">
          <label>Postal Code</label>
          <input type="text" id="new-postal" placeholder="75000">
        </div>
      </div>
      <div class="form-group">
        <label>Country</label>
        <input type="text" id="new-country" value="Pakistan">
      </div>
    </div>

    <!-- Coupon -->
    <div class="form-group">
      <label>Coupon Code (optional)</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="coupon"
               placeholder="e.g. NUCES20" style="flex:1">
        <button class="btn btn-outline" onclick="applyCoupon()">Apply</button>
      </div>
      <div id="coupon-msg" style="font-size:12px;margin-top:6px"></div>
    </div>

    <!-- Payment -->
    <div class="form-group">
      <label>Payment Method</label>
      <select id="method">
        <option value="cod">Cash on Delivery</option>
        <option value="easypaisa">EasyPaisa</option>
        <option value="jazzcash">JazzCash</option>
        <option value="credit_card">Credit Card</option>
        <option value="debit_card">Debit Card</option>
      </select>
    </div>

    <button class="btn btn-primary"
            style="width:100%;font-size:16px;padding:14px;margin-top:8px"
            onclick="placeOrder()">
      Place Order →
    </button>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  requireLogin();
  let cartItems = [];

  async function loadSummary() {
    cartItems = await api.get('/cart');
    const total = cartItems.reduce((s, i) => s + Number(i.SUBTOTAL), 0);

    document.getElementById('order-summary').innerHTML =
      cartItems.map(i =>
        `<div style="display:flex;justify-content:space-between;padding:4px 0">
           <span>${i.NAME} × ${i.QUANTITY}</span>
           <span>Rs. ${Number(i.SUBTOTAL).toLocaleString()}</span>
         </div>`
      ).join('');

    document.getElementById('order-total').innerHTML =
      `Total: Rs. ${total.toLocaleString()}`;
  }

  async function loadAddresses() {
    try {
      const addresses = await api.get('/user/addresses');
      const select = document.getElementById('address-select');

      if (addresses.length === 0) {
        select.innerHTML =
          '<option value="new">+ Add New Address</option>';
        document.getElementById('new-address-box').style.display = 'block';
      } else {
        select.innerHTML =
          addresses.map(a =>
            `<option value="${a.ADDRESS_ID}">
               ${a.STREET}, ${a.CITY}, ${a.COUNTRY}
               ${a.IS_DEFAULT ? '(Default)' : ''}
             </option>`
          ).join('') +
          '<option value="new">+ Add New Address</option>';
      }

      select.addEventListener('change', () => {
        document.getElementById('new-address-box').style.display =
          select.value === 'new' ? 'block' : 'none';
      });
    } catch(e) {
      console.error(e);
    }
  }

  async function applyCoupon() {
    const code  = document.getElementById('coupon').value;
    const msg   = document.getElementById('coupon-msg');
    if (!code) return;

    const total = cartItems.reduce((s, i) => s + Number(i.SUBTOTAL), 0);
    try {
      const data = await api.post('/orders/verify-coupon', {
        coupon_code: code,
        total:       total
      });
      msg.innerHTML = `
        <span style="color:#10b981">
          ✓ Coupon applied! You save Rs. ${Number(data.discount).toLocaleString()}
          — Final: Rs. ${Number(data.final).toLocaleString()}
        </span>`;
    } catch(e) {
      msg.innerHTML = `<span style="color:#ef4444">✗ ${e.message}</span>`;
    }
  }

  async function placeOrder() {
    const msg        = document.getElementById('msg');
    const addrSelect = document.getElementById('address-select');
    const method     = document.getElementById('method').value;
    const coupon     = document.getElementById('coupon').value || null;

    if (!cartItems.length) {
      msg.innerHTML = '<div class="alert alert-error">Your cart is empty!</div>';
      return;
    }

    try {
      let addressId = addrSelect.value;

      if (addressId === 'new') {
        const newAddr = await api.post('/user/addresses', {
          street:      document.getElementById('new-street').value,
          city:        document.getElementById('new-city').value,
          postal_code: document.getElementById('new-postal').value,
          country:     document.getElementById('new-country').value
        });
        addressId = newAddr.address_id;
      }

      const data = await api.post('/orders/checkout', {
        address_id:     Number(addressId),
        coupon_code:    coupon,
        payment_method: method
      });

      const saved = Number(data.discount_applied) || 0;
      const final = Number(data.total_amount) || 0;

      msg.innerHTML = `
        <div class="alert alert-success">
          ✓ Order #${data.order_id} placed successfully!
          ${saved > 0
            ? `<br>💰 Coupon applied! You saved <strong>Rs. ${saved.toLocaleString()}</strong>
              <br>Final amount: <strong>Rs. ${final.toLocaleString()}</strong>`
            : ''}
          <br>Redirecting to orders...
        </div>`;
      setTimeout(() => location.href = '/orders.html', 2000);
    } catch(e) {
      msg.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
    }
  }

  updateNav();
  loadSummary();
  loadAddresses();
</script>
</body>
</html>
